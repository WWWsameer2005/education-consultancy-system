<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #000428, #004e92);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #1959a8);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            color: white;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
        }

        .register-link {
            margin-top: 15px;
            display: block;
            color: #cfe2e7;
            text-decoration: none;
        }

        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>🔐 Admin Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <br>
        <button type="submit">Login</button>
    </form>

    <!-- Register Link -->
    <a href="/admin_register" class="register-link">Don't have an account? Register here</a>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <!-- Back Button -->
    <a href="/" class="back-btn">⬅ Back to Home</a>
</div>

</body>
</html>
