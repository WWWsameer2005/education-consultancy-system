<!DOCTYPE html>
<html>
<head>
    <title>All Colleges</title>
    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#141e30,#243b55);
            color:white;
        }

        /* Top Bar */
        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 40px;
        }

        h1{
            margin:0;
        }

        /* Stylish Home Button */
        .home-btn{
            padding:10px 22px;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            color:white;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:0.4s;
            box-shadow:0 8px 20px rgba(0,114,255,0.4);
        }

        .home-btn:hover{
            transform:translateY(-4px) scale(1.05);
            box-shadow:0 12px 25px rgba(0,114,255,0.6);
        }

        .card-container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .card{
            width:280px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            border-radius:15px;
            padding:15px;
            transition:0.4s;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .college-img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:10px;
        }

        .btn{
            display:inline-block;
            margin-top:10px;
            padding:8px 15px;
            background:#00c6ff;
            border-radius:8px;
            text-decoration:none;
            color:white;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>🎓 Best Colleges</h1>
    <a href="/" class="home-btn">🏠 Home</a>
</div>

<div class="card-container">
    {% for college in colleges %}
    <div class="card">
        <img src="{{ college.image }}" class="college-img">
        <h3>{{ college.name }}</h3>
        <p>📍 {{ college.location }}, {{ college.state }}</p>
        <p>⭐ Rating: {{ college.rating }}/5</p>
        <p>💰 Fees: ₹{{ college.fees }}</p>
        <a class="btn" href="/college/{{ college.id }}">View Details</a>
    </div>
    {% endfor %}
</div>

</body>
</html>
